<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dropbox Assignment</title>
    <link rel="stylesheet" href="{{ request.url_for('static', path='styles.css') }}">
    <script type="module" src="{{ request.url_for('static', path='firebase-login.js') }}"></script>
</head>
<body>
    <div class="main">
        <div class="box">
            <h1>Dropbox Assignment</h1>
            {% if user_token %}
            <p>Signed in as {{ user_token.email }}.</p>
            <button id="sign-out" type="button">Sign Out</button>
            {% else %}
            <div id="login-box" hidden>
                <input id="email" type="email" placeholder="Email">
                <input id="password" type="password" placeholder="Password">
                <button id="login" type="button">Login</button>
                <button id="signup" type="button">Sign Up</button>
            </div>
            <button id="sign-out" type="button" hidden>Sign Out</button>
            {% endif %}
        </div>
    </div>
</body>
</html>
